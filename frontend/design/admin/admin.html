<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panal</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="top">
                <div class="sidebar-header">
                    <img src="../images/logo2.png" alt="logo" class="main-logo">
                    <img src="../images/logo-image-letter.png" alt="" class="logo-letter">
                </div>
                <div class="sidebar-body">
                    <ul>
                        <li><i class="fa-solid fa-table"></i><a href="#">Dashboard</a></li>
                        <li><i class="fa-solid fa-user"></i><a href="#">Users</a></li>
                        <li><i class="fa-solid fa-box"></i><a href="#">Products</a></li>
                        <li><i class="fa-solid fa-cube"></i><a href="#">Orders</a></li>
                        <li><i class="fa-solid fa-gear"></i><a href="#">Settings</a></li>
                    </ul>
                </div>
            </div>
            <div class="bottom">
                <div class="responsive-footer">
                    <img src="../images/user-profile-image.png" alt="">
                    <div class="prodile-box">
                        <div class="footer-right">
                            <h3>Admin</h3>
                            <p>dulanjananisal67@gmail.com</p>
                        </div>
                        <button class="log-out">Log Out</button>
                    </div>
                </div>
                <div class="sidebar-footer">
                    <div class="footer-left">
                        <img src="../images/user-profile-image.png" alt="user-profile">
                    </div>
                    <div class="footer-right">
                        <h3>Admin</h3>
                        <p>dulanjananisal67@gmail.com</p>
                    </div>
                    <button class="log-out">Log Out</button>
                </div>
            </div>
        </div>
        <div class="sections">
            <div class="section-header">
                <div class="header-top-left">
                    <h1>Dashboard</h1>
                </div>
                <div class="header-top-right">
                    <div class="cart">
                        <i class="fa-solid fa-bell"></i>
                        <p>0</p>
                    </div>
                    <div class="store">
                        <button><i class="fa-solid fa-store"></i><p>Go to Store</p></button>
                    </div>
                </div>
            </div>
            <div class="sections-body">
                <!-- Dashboard Section -->
                <div class="dashboard-section">
                    <div class="dashboard-header">
                        <p>Welcome back, <span>Dulanjana Nisal 👋</span></p>
                    </div>
                    <div class="dashboard-body">
                        <div class="user-count box">
                            <i class="fa-regular fa-user"></i>
                            <div class="details">
                                <h1>3</h1>
                                <p>Total Customers</p>
                            </div>
                        </div>
                        <div class="product-count box">
                            <i class="fa-solid fa-box-archive"></i>
                            <div class="details">
                                <h1>100</h1>
                                <p>Total Products</p>
                            </div>
                        </div>
                        <div class="order-count box">
                            <i class="fa-solid fa-cube"></i>
                            <div class="details">
                                <h1>0</h1>
                                <p>Total Orders</p>
                            </div>
                        </div>
                        <div class="order-status box">
                            <i class="fa-solid fa-clock"></i>
                            <div class="details">
                                <h1>3</h1>
                                <p>Pending Delivery</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
